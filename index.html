<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foggia Live Pulse — ORA in città</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        background-color: #000;
      }
      body {
        font-family: 'JetBrains Mono', monospace;
      }
      
      /* Animazione post-it espanso */
      @keyframes expandPostIt {
        from { transform: scale(0.3) translateY(0); opacity: 0; }
        to { transform: scale(1) translateY(-60px); opacity: 1; }
      }
      
      .expanded-postit {
        animation: expandPostIt 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        z-index: 9999 !important;
      }

      /* Pin 3D Style */
      .pin-3d {
        width: 24px;
        height: 24px;
        border-radius: 50% 50% 50% 0;
        transform: rotate(-45deg);
        box-shadow: 0 0 10px rgba(0,255,65,0.2);
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        position: relative;
      }
      .pin-3d:hover {
        transform: rotate(-45deg) scale(1.5);
        z-index: 1000;
        box-shadow: 0 0 20px rgba(0,255,65,0.5);
      }

      .leaflet-container {
        height: 100% !important;
        width: 100% !important;
        background: #000 !important;
        outline: 0;
      }
      
      .custom-div-icon {
        background: transparent !important;
        border: none !important;
      }

      ::-webkit-scrollbar { width: 2px; }
      ::-webkit-scrollbar-thumb { background: #00ff41; }
    </style>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
